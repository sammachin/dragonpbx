openapi: 3.0.0

info:
  title: Dragon PBX API
  description: Programmable PBX.
  version: 0.1.0

servers:
  - url: http://locahost:3000/v1
    description: Dev Server

paths:
  /domain:
    get:
      summary: Returns a list of domains.
      description: Optional extended description in CommonMark or HTML.
      responses:
        "200": # status code
          description: A JSON array of domains
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  example: "sip.example.com"
  /domain/{domain}:
    get:
      summary: Returns details of a domain.
      description: Optional extended description in CommonMark or HTML.
      parameters:
        - name: domain
          in: path
          description: Domain 
          required: true
          schema:
            type: string
      responses:
        "200": # status code
          description: A JSON array of domains
          content:
            application/json:
              schema:
                type: object
                items:
                  type: string
                  example: "sip.example.com"
        "404": 
          description: Not Found
    delete:
      summary: Delete  of a domain.
      description: Optional extended description in CommonMark or HTML.
      parameters:
        - name: domain
          in: path
          description: Domain 
          required: true
          schema:
            type: string
      responses:
        "204": # status code
          description: No Content
        "404": 
          description: Not Found
    put:
      summary: Update a domain.
      description: Optional extended description in CommonMark or HTML.
      parameters:
        - name: domain
          in: path
          description: Domain 
          required: true
          schema:
            type: string
      responses:
        "204": # status code
          description: No Content
        "404": 
          description: Not Found
  /domain/{domain}/users:
    get:
      summary: List users on a domain.
      description: Optional extended description in CommonMark or HTML.
      parameters:
        - name: domain
          in: path
          description: Domain 
          required: true
          schema:
            type: string
      responses:
        "200": # status code
          description: A JSON array of userIDs
          content:
            application/json:
              schema:
                type: object
                items:
                  type: string
                  example: "user-"
        "404": 
          description: Not Found       