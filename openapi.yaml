openapi: 3.0.0

info:
  title: Dragon PBX API
  description: Programmable PBX.
  version: 0.1.0


servers:

  - url: http://locahost:3000/v1

    description: Dev Server



paths:
  /domain:
    get:
      summary: Returns a list of domains.
      description: Optional extended description in CommonMark or HTML.
      responses:
        "200": # status code
          description: A JSON array of domains
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                