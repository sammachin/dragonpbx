services:
  dragonpbx:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "2999:2999"
    environment:
      - DRACHTIO_HOST=drachtio
      - DRACHTIO_PORT=9022
      - DRACHTIO_SECRET=${DRACHTIO_SECRET:-cymru}
      - RTPENGINE_HOST=rtpengine
      - RTPENGINE_PORT=2223
      - REDIS_URL=redis://redis:6379
      - DATA_SOURCE=${DATA_SOURCE:-api}
      - CONFIG_URL=${CONFIG_URL}
      - CONFIG_TOKEN=${CONFIG_TOKEN}
      - CONFIG_TTL=${CONFIG_TTL:-60}
      - WEBPORT=2999
      - LOGLEVEL=${LOGLEVEL:-info}
    volumes:
      - media:/app/media
      - media-cache:/tmp
    depends_on:
      - drachtio
      - rtpengine
      - redis
    restart: unless-stopped

  drachtio:
    image: drachtio/drachtio-server:latest
    command: drachtio --contact "sip:*;transport=udp" --contact "sip:*;transport=tcp" --admin-port 9022
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
    environment:
      - DRACHTIO_SECRET=${DRACHTIO_SECRET:-cymru}
    restart: unless-stopped

  rtpengine:
    image: drachtio/rtpengine:latest
    ports:
      - "2223:2223/udp"
      - "40000-60000:40000-60000/udp"
    volumes:
      - media:/app/media
      - media-cache:/tmp
    environment:
      - RTPENGINE_PORT_MIN=40000
      - RTPENGINE_PORT_MAX=60000
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    restart: unless-stopped

volumes:
  media:
  media-cache:
